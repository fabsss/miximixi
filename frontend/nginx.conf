map $http_user_agent $is_bot {
    default                 0;
    ~*TelegramBot           1;
    ~*WhatsApp              1;
    ~*Slackbot              1;
    ~*Discordbot            1;
    ~*Twitterbot            1;
    ~*facebookexternalhit   1;
    ~*LinkedInBot           1;
    ~*iMessageBot           1;
}

upstream backend_og {
    server backend:8000;
}

server {
    listen 2000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Bot-Routing: Bots auf /recipes/ bekommen OG-HTML vom Backend
    location /recipes/ {
        if ($is_bot = 1) {
            rewrite ^(/recipes/.*)$ /og$1 last;
        }
        try_files $uri /index.html;
    }

    # OG-Proxy intern (nur erreichbar nach rewrite)
    location /og/recipes/ {
        proxy_pass http://backend_og;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: route everything to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
