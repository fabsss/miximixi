<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Miximixi – Pipeline-Verifikation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #ff9973; }
    p.subtitle { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    .card h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 1rem; }

    /* Import Box */
    .import-form { display: flex; flex-direction: column; gap: 0.75rem; }
    input[type="text"] {
      background: #333;
      border: 1px solid #444;
      border-radius: 0.5rem;
      color: #e5e5e5;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      width: 100%;
    }
    input[type="text"]:focus { outline: none; border-color: #ff9973; }
    button {
      background: #a43f14;
      color: white;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #c24e18; }
    button:disabled { background: #555; cursor: not-allowed; }

    .status-msg {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      display: none;
    }
    .status-msg.info { display: block; background: #1e3a5f; color: #93c5fd; }
    .status-msg.success { display: block; background: #14532d; color: #86efac; }
    .status-msg.error { display: block; background: #450a0a; color: #fca5a5; }

    /* Queue Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; color: #666; font-weight: 600; padding-bottom: 0.5rem; border-bottom: 1px solid #333; }
    td { padding: 0.6rem 0; border-bottom: 1px solid #2a2a2a; vertical-align: top; }
    td:first-child { color: #888; width: 80px; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.pending { background: #3b2a00; color: #fbbf24; }
    .badge.processing { background: #1e3a5f; color: #60a5fa; }
    .badge.done { background: #14532d; color: #4ade80; }
    .badge.error { background: #450a0a; color: #f87171; }

    /* Recipe Grid */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }
    .recipe-card {
      background: #2a2a2a;
      border-radius: 0.5rem;
      overflow: hidden;
      border: 1px solid #333;
    }
    .recipe-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #333;
    }
    .recipe-card .info { padding: 0.6rem; }
    .recipe-card .title { font-size: 0.8rem; font-weight: 600; color: #e5e5e5; line-height: 1.3; }
    .recipe-card .meta { font-size: 0.7rem; color: #666; margin-top: 0.2rem; }
    .recipe-card .category {
      display: inline-block;
      font-size: 0.65rem;
      background: #333;
      color: #999;
      padding: 0.1rem 0.4rem;
      border-radius: 9999px;
      margin-top: 0.3rem;
    }

    .empty { color: #555; font-size: 0.85rem; text-align: center; padding: 2rem 0; }
    .refresh-btn {
      background: #2a2a2a;
      border: 1px solid #444;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      float: right;
      margin-top: -0.25rem;
    }
    .refresh-btn:hover { background: #333; }
  </style>
</head>
<body>
  <h1>🍳 Miximixi – Pipeline-Verifikation</h1>
  <p class="subtitle">Direkte Verbindung zum Backend – kein Auth nötig (Service Key)</p>

  <div class="grid">

    <!-- Import -->
    <div class="card">
      <h2>Manueller Import</h2>
      <div class="import-form">
        <input type="text" id="import-url" placeholder="https://www.instagram.com/p/..." />
        <select id="source-type" style="background:#333;border:1px solid #444;border-radius:0.5rem;color:#e5e5e5;padding:0.75rem 1rem;font-size:0.9rem;">
          <option value="manual">Manual</option>
          <option value="telegram">Telegram</option>
          <option value="instagram">Instagram</option>
        </select>
        <button id="import-btn" onclick="triggerImport()">Importieren</button>
        <div id="import-status" class="status-msg"></div>
      </div>
    </div>

    <!-- Backend Status -->
    <div class="card">
      <h2>Backend Status</h2>
      <div id="backend-status"><span class="empty">Wird geprüft…</span></div>
    </div>

    <!-- Queue -->
    <div class="card" style="grid-column: 1 / -1;">
      <h2>
        Import Queue
        <button class="refresh-btn" onclick="loadQueue()">↻ Aktualisieren</button>
      </h2>
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>URL</th>
            <th>Typ</th>
            <th>Erstellt</th>
          </tr>
        </thead>
        <tbody id="queue-body">
          <tr><td colspan="4"><div class="empty">Lädt…</div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Recipes -->
    <div class="card" style="grid-column: 1 / -1;">
      <h2>
        Rezepte in der Datenbank
        <button class="refresh-btn" onclick="loadRecipes()">↻ Aktualisieren</button>
      </h2>
      <div id="recipe-grid" class="recipe-grid">
        <div class="empty">Lädt…</div>
      </div>
    </div>

  </div>

  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:8000'
      : '/api';  // In Produktion via Reverse Proxy

    // ── Backend Health ────────────────────────────────────────────────
    async function checkBackend() {
      const el = document.getElementById('backend-status');
      try {
        const r = await fetch(`${API}/health`);
        const data = await r.json();
        el.innerHTML = `
          <div style="color:#4ade80;font-size:0.9rem;font-weight:600;">✓ Online</div>
          <div style="color:#888;font-size:0.8rem;margin-top:0.5rem;">
            LLM Provider: <strong style="color:#ff9973">${data.llm_provider}</strong>
          </div>
        `;
      } catch (e) {
        el.innerHTML = `
          <div style="color:#f87171;font-size:0.9rem;font-weight:600;">✗ Nicht erreichbar</div>
          <div style="color:#888;font-size:0.75rem;margin-top:0.5rem;">
            Läuft das Backend? <code>poetry run uvicorn app.main:app --reload</code>
          </div>
        `;
      }
    }

    // ── Import ────────────────────────────────────────────────────────
    async function triggerImport() {
      const url = document.getElementById('import-url').value.trim();
      const sourceType = document.getElementById('source-type').value;
      const statusEl = document.getElementById('import-status');
      const btn = document.getElementById('import-btn');

      if (!url) {
        statusEl.className = 'status-msg error';
        statusEl.textContent = 'Bitte eine URL eingeben';
        return;
      }

      btn.disabled = true;
      statusEl.className = 'status-msg info';
      statusEl.textContent = 'Wird in Queue eingereiht…';

      try {
        const r = await fetch(`${API}/import`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, source_type: sourceType }),
        });
        const data = await r.json();

        statusEl.className = 'status-msg success';
        statusEl.textContent = `✅ ${data.message} (ID: ${data.queue_id.slice(0,8)}…)`;
        document.getElementById('import-url').value = '';

        setTimeout(() => loadQueue(), 1000);
      } catch (e) {
        statusEl.className = 'status-msg error';
        statusEl.textContent = `Fehler: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    // ── Queue ─────────────────────────────────────────────────────────
    async function loadQueue() {
      const tbody = document.getElementById('queue-body');
      try {
        const r = await fetch(`${API}/import`);
        const jobs = await r.json();

        if (!jobs.length) {
          tbody.innerHTML = '<tr><td colspan="4"><div class="empty">Keine Jobs in der Queue</div></td></tr>';
          return;
        }

        tbody.innerHTML = jobs.map(job => `
          <tr>
            <td><span class="badge ${job.status}">${job.status}</span></td>
            <td style="max-width:300px;word-break:break-all;color:#ccc;">
              <a href="${job.source_url}" target="_blank" style="color:#ff9973;text-decoration:none;">
                ${job.source_url.length > 60 ? job.source_url.slice(0, 60) + '…' : job.source_url}
              </a>
              ${job.error_msg ? `<div style="color:#f87171;font-size:0.72rem;margin-top:0.2rem;">⚠ ${job.error_msg.slice(0,100)}</div>` : ''}
              ${job.recipe_id ? `<div style="color:#4ade80;font-size:0.72rem;margin-top:0.2rem;">recipe_id: ${job.recipe_id.slice(0,8)}…</div>` : ''}
            </td>
            <td style="color:#888;">${job.source_type || '—'}</td>
            <td style="color:#555;">${new Date(job.created_at).toLocaleTimeString('de')}</td>
          </tr>
        `).join('');
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty" style="color:#f87171">Fehler: ${e.message}</div></td></tr>`;
      }
    }

    // ── Recipes ───────────────────────────────────────────────────────
    async function loadRecipes() {
      const grid = document.getElementById('recipe-grid');
      try {
        const r = await fetch(`${API}/recipes`);
        const recipes = await r.json();

        if (!recipes.length) {
          grid.innerHTML = '<div class="empty">Noch keine Rezepte importiert</div>';
          return;
        }

        grid.innerHTML = recipes.map(recipe => `
          <div class="recipe-card">
            ${recipe.image_url
              ? `<img src="${recipe.image_url}" alt="${recipe.title}" loading="lazy"/>`
              : `<div style="width:100%;aspect-ratio:4/3;background:#333;display:flex;align-items:center;justify-content:center;color:#555;font-size:1.5rem;">🍽</div>`
            }
            <div class="info">
              <div class="title">${recipe.title}</div>
              <div class="meta">${recipe.source_label || '—'}</div>
              ${recipe.category ? `<span class="category">${recipe.category}</span>` : ''}
            </div>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = `<div class="empty" style="color:#f87171">Fehler: ${e.message}</div>`;
      }
    }

    // ── Init ──────────────────────────────────────────────────────────
    checkBackend();
    loadQueue();
    loadRecipes();

    // Auto-Refresh alle 10 Sekunden
    setInterval(() => {
      loadQueue();
      loadRecipes();
    }, 10000);

    // Enter-Taste im Input
    document.getElementById('import-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') triggerImport();
    });
  </script>
</body>
</html>
