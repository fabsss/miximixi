<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
  <!-- Fork (Gabel) - rotated 45 degrees counterclockwise -->
  <g transform="translate(12, 12) rotate(-45) translate(-12, -12)">
    <!-- Fork handle -->
    <rect x="10.5" y="14" width="3" height="8" rx="1.5" fill="currentColor"/>
    <!-- Fork tines -->
    <rect x="6" y="4" width="2" height="10" rx="1" fill="currentColor"/>
    <rect x="11" y="4" width="2" height="10" rx="1" fill="currentColor"/>
    <rect x="16" y="4" width="2" height="10" rx="1" fill="currentColor"/>
  </g>

  <!-- Knife (Messer) - rotated 45 degrees clockwise -->
  <g transform="translate(12, 12) rotate(45) translate(-12, -12)">
    <!-- Knife handle -->
    <rect x="10.5" y="14" width="3" height="8" rx="1.5" fill="currentColor"/>
    <!-- Knife blade -->
    <path d="M 12 4 L 13.5 14 L 10.5 14 Z" fill="currentColor"/>
  </g>
</svg>
