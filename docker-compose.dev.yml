name: miximixi-dev

# Dev-Override: Plain PostgreSQL, Backend hot-reload, kein Frontend-Build
# Starten mit: docker compose -f docker-compose.dev.yml up -d

services:

  # ── PostgreSQL Database ────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: miximixi-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-miximixi}
    volumes:
      - ./data/db-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (CPU-only) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: miximixi-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama-models:/root/.ollama

# Using bind mounts for persistent development data
# All paths relative to this docker-compose.yml file location
