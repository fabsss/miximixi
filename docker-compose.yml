name: miximixi

services:

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://miximixi-api.sektbirne.fun}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: miximixi-frontend
    restart: unless-stopped
    ports:
      - "2000:80"
    depends_on:
      - backend
    networks:
      - miximixi
      - proxy

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miximixi-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2-vision:11b}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-miximixi}
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
      - INSTAGRAM_PASSWORD=${INSTAGRAM_PASSWORD}
      - INSTAGRAM_COLLECTION_ID=${INSTAGRAM_COLLECTION_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - /mnt/data/nobackup/miximixi/backend-tmp:/tmp/miximixi
      - /mnt/data/backup/miximixi/recipe-images:/data/recipe-images
      - /mnt/data/backup/miximixi/instagram_session.json:/app/instagram_session.json
    depends_on:
      db:
        condition: service_healthy
    networks:
      - miximixi
      - proxy

  # ── Ollama (CPU-only LLM) ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: miximixi-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /mnt/data/nobackup/miximixi/ollama-models:/root/.ollama
    networks:
      - miximixi

  # ── n8n ───────────────────────────────────────────────────
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    container_name: miximixi-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BACKEND_URL=http://backend:8000
      - WEBHOOK_URL=https://miximixi-n8n.sektbirne.fun
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
    volumes:
      - /mnt/data/backup/miximixi/n8n-data:/home/node/.n8n
    depends_on:
      - backend
    networks:
      - miximixi
      - proxy

  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: miximixi-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-miximixi}
    volumes:
      - /mnt/data/backup/miximixi/db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - miximixi

# Volumes are now bind-mounted to /mnt/data/nobackup/miximixi/
# Named volumes section removed - see docker-compose.yml volumes configuration

networks:
  miximixi:
    driver: bridge
  proxy:
    external: true