name: miximixi

services:

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://miximixi-api.sektbirne.fun
    container_name: miximixi-frontend
    restart: unless-stopped
    ports:
      - "2000:2000"
    depends_on:
      - backend
    networks:
      - miximixi
      - proxy

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miximixi-backend
    restart: unless-stopped
    stop_grace_period: 35s
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2-vision:11b}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-miximixi}
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
      - INSTAGRAM_PASSWORD=${INSTAGRAM_PASSWORD}
      - INSTAGRAM_COLLECTION_ID=${INSTAGRAM_COLLECTION_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - FRONTEND_URL=${FRONTEND_DOMAIN}
    volumes:
      - /mnt/data/nobackup/miximixi/backend-tmp:/tmp/miximixi
      - /mnt/data/backup/miximixi/recipe-images:/data/recipe-images
      - /mnt/data/backup/miximixi/instagram_cookies.txt:/mnt/data/miximixi/instagram_cookies.txt
      - /mnt/data/backup/miximixi/instagram_browser_state:/mnt/data/miximixi/instagram_browser_state
    depends_on:
      db:
        condition: service_healthy
    networks:
      - miximixi
      - proxy

  # ── Ollama (CPU-only LLM) ─────────────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: miximixi-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - /mnt/data/nobackup/miximixi/ollama-models:/root/.ollama
  #   networks:
  #     - miximixi

  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: miximixi-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-miximixi}
    volumes:
      - /mnt/data/backup/miximixi/db-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - miximixi

# Volumes are now bind-mounted to /mnt/data/nobackup/miximixi/
# Named volumes section removed - see docker-compose.yml volumes configuration

networks:
  miximixi:
    driver: bridge
  proxy:
    external: true