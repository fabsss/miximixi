name: Setup Branch Protection

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to configure branch protection on main'
        required: true
        default: ""

jobs:
  protect-main:
    name: Configure Branch Protection for main
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'

    steps:
      - name: Configure branch protection via GitHub API
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_PAT }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/branches/main/protection" \
            -d '{
              "required_status_checks": {
                "strict": true,
                "contexts": ["All Checks Passed"]
              },
              "enforce_admins": true,
              "required_pull_request_reviews": null,
              "restrictions": null
            }' | jq .

      - name: Verify branch protection
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_PAT }}
          REPO: ${{ github.repository }}
        run: |
          echo "Current protection rules for main:"
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/branches/main/protection" \
            | jq '.required_status_checks'
